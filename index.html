<!DOCTYPE html>
<html lang="en" data-theme="phonebooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>grind.app 💀</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- floating star particles -->
  <div id="starbg"></div>

  <!-- scrolling ticker tape -->
  <button class="ticker-toggle" id="tickerToggle" title="toggle ticker">ticker ✦</button>
  <div class="ticker-wrap" id="tickerWrap">
    <div class="ticker">
      <div class="ticker-t" id="tickerEl"></div>
    </div>
  </div>

  <div class="wrap">

    <!-- ── HEADER ── -->
    <header>
      <div>
        <div class="logo">grind.app<span class="blink">_</span></div>
        <div class="logo-s">pomodoro timer for the delusional achiever</div>
      </div>
      <div class="hdr-r">
        <!-- theme switcher -->
        <div class="themes" id="themeWrap">
          <button class="tb on" data-t="phonebooth" title="phone booth">📞</button>
          <button class="tb"    data-t="transit"    title="transit mode">🚆</button>
          <button class="tb"    data-t="streetwear" title="streetwear">🔥</button>
          <button class="tb"    data-t="y2k"        title="y2k bby">💗</button>
        </div>
        <!-- settings gear -->
        <button class="ibtn" id="settBtn" title="settings">
          <svg viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06
                     a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09
                     A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83
                     l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09
                     A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83
                     l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09
                     a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83
                     l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09
                     a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- ── MODE TABS ── -->
    <div class="modes" id="modeWrap">
      <button class="mb on" data-mode="pomodoro">🍅 Pomodoro</button>
      <button class="mb"    data-mode="short">💤 Short Break</button>
      <button class="mb"    data-mode="long">🛋 Long Break</button>
    </div>

    <!-- ── MAIN GRID ── -->
    <div class="grid">

      <!-- left: timer -->
      <div class="tsec">

        <!-- radial SVG ring -->
        <div class="rw">
          <svg viewBox="0 0 286 286">
            <circle id="rdeco"  cx="143" cy="143" r="136"/>
            <circle id="rtrack" cx="143" cy="143" r="125"/>
            <circle id="rglow"  cx="143" cy="143" r="125"/>
            <circle id="rprog"  cx="143" cy="143" r="125"/>
          </svg>
          <div class="tinn">
            <div class="tdigs" id="tdisp">25:00</div>
            <div class="tlbl"  id="tlbl">FOCUS TIME</div>
            <div class="tstat" id="tstat">&nbsp;</div>
          </div>
        </div>

        <!-- motivational quote -->
        <div class="qbox" id="qbox">
          <div class="qtxt" id="qtxt">ready when you are bestie 👀</div>
        </div>

        <!-- timer controls -->
        <div class="ctrls">
          <button class="cb" id="resetBtn" title="reset">
            <svg viewBox="0 0 24 24">
              <polyline points="1 4 1 10 7 10"/>
              <path d="M3.51 15a9 9 0 1 0 .49-3.73"/>
            </svg>
          </button>
          <button class="pb" id="playBtn">▶</button>
          <button class="cb" id="skipBtn" title="skip">
            <svg viewBox="0 0 24 24">
              <polygon points="5 4 15 12 5 20 5 4"/>
              <line x1="19" y1="5" x2="19" y2="19"/>
            </svg>
          </button>
        </div>

        <!-- session progress dots -->
        <div class="dots" id="dotsEl"></div>

      </div><!-- /tsec -->

      <!-- right: task list -->
      <div class="tpanel">
        <div class="phdr">
          <span class="plbl">the grind list 📋</span>
          <span class="tcount" id="tcnt">0 tasks</span>
        </div>
        <div class="tirow">
          <input class="tinp" id="tinput" type="text" placeholder="add a task bestie..." maxlength="120">
          <button class="tadd" id="addBtn">+</button>
        </div>
        <div class="tlist" id="tlist"></div>
      </div>

    </div><!-- /grid -->
  </div><!-- /wrap -->

  <!-- ── SETTINGS MODAL ── -->
  <div class="overlay" id="ovl">
    <div class="modal">
      <div class="mtitle">settings.exe</div>
      <button class="mx" id="mxBtn">✕</button>

      <div class="sg">
        <div class="sgl">session durations (minutes)</div>

        <div class="sr">
          <span class="sl">🍅 Pomodoro</span>
          <div class="nc">
            <button class="nb" data-k="pomodoro" data-d="-1">−</button>
            <span class="nv" id="s-pomodoro">25</span>
            <button class="nb" data-k="pomodoro" data-d="1">+</button>
          </div>
        </div>

        <div class="sr">
          <span class="sl">💤 Short break</span>
          <div class="nc">
            <button class="nb" data-k="short" data-d="-1">−</button>
            <span class="nv" id="s-short">5</span>
            <button class="nb" data-k="short" data-d="1">+</button>
          </div>
        </div>

        <div class="sr">
          <span class="sl">🛋 Long break</span>
          <div class="nc">
            <button class="nb" data-k="long" data-d="-1">−</button>
            <span class="nv" id="s-long">15</span>
            <button class="nb" data-k="long" data-d="1">+</button>
          </div>
        </div>

        <div class="sr">
          <span class="sl">🔁 Long break every</span>
          <div class="nc">
            <button class="nb" data-k="interval" data-d="-1">−</button>
            <span class="nv" id="s-interval">4</span>
            <button class="nb" data-k="interval" data-d="1">+</button>
          </div>
        </div>
      </div><!-- /sg -->

      <div class="sg">
        <div class="sgl">vibes</div>
        <div class="togrow">
          <span class="togl">Auto-start next session</span>
          <div class="tog" id="tog-auto"></div>
        </div>
        <div class="togrow">
          <span class="togl">Sound effects</span>
          <div class="tog on" id="tog-sound"></div>
        </div>
      </div>

      <button class="sbtn" id="saveBtn">save it bestie ✦</button>
    </div>
  </div>

  <!-- toast notification -->
  <div class="toast" id="toastEl"></div>

  <script src="app.js"></script>
</body>
</html>
