<!DOCTYPE html>
<html lang="en" data-theme="phonebooth" data-mode="pomodoro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>grind.app 💀</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ambient background layers -->
  <div id="mode-bg"></div>
  <div id="star-bg"></div>

  <!-- scrolling ticker (toggled via button) -->
  <button class="ticker-toggle" id="ticker-toggle" title="toggle ticker">ticker ✦</button>
  <div class="ticker-wrap" id="ticker-wrap">
    <div class="ticker">
      <div class="ticker-track" id="ticker-track"></div>
    </div>
  </div>

  <div class="app-wrap">

    <!-- ── HEADER ───────────────────────────────────────── -->
    <header class="app-header">
      <div>
        <h1 class="logo">grind.app<span class="blink">_</span></h1>
        <p class="logo-tagline">pomodoro for the delusional achiever</p>
      </div>
      <div class="header-controls">

        <!-- theme switcher -->
        <div class="theme-switcher" id="theme-switcher">
          <button class="theme-btn active" data-theme="phonebooth" title="phone booth">📞</button>
          <button class="theme-btn"        data-theme="transit"    title="transit">🚆</button>
          <button class="theme-btn"        data-theme="streetwear" title="streetwear">🔥</button>
          <button class="theme-btn"        data-theme="y2k"        title="y2k">💗</button>
        </div>

        <!-- chill mode: sun = full, moon = calm -->
        <button class="icon-btn" id="chill-btn" title="toggle chill mode">
          <svg class="icon-sun" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1"  x2="12" y2="3"/>  <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1"  y1="12" x2="3"  y2="12"/>  <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22"  y1="19.78" x2="5.64"  y2="18.36"/>
            <line x1="18.36" y1="5.64"  x2="19.78" y2="4.22"/>
          </svg>
          <svg class="icon-moon" viewBox="0 0 24 24" style="display:none">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>

        <!-- settings gear -->
        <button class="icon-btn" id="settings-btn" title="settings">
          <svg viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06
                     a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09
                     A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83
                     l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09
                     A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83
                     l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09
                     a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83
                     l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09
                     a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- ── MODE TABS ─────────────────────────────────────── -->
    <nav class="mode-tabs" id="mode-tabs">
      <button class="mode-tab active" data-mode="pomodoro">🍅 Pomodoro</button>
      <button class="mode-tab"        data-mode="short">💤 Short Break</button>
      <button class="mode-tab"        data-mode="long">🛋 Long Break</button>
    </nav>

    <!-- ── MAIN GRID ─────────────────────────────────────── -->
    <div class="main-grid">

      <!-- LEFT: timer + focused task + quote + controls -->
      <div class="timer-panel">

        <!-- radial countdown ring -->
        <div class="ring-wrap">
          <svg viewBox="0 0 286 286">
            <circle id="ring-deco"  cx="143" cy="143" r="136"/>
            <circle id="ring-track" cx="143" cy="143" r="125"/>
            <circle id="ring-glow"  cx="143" cy="143" r="125"/>
            <circle id="ring-prog"  cx="143" cy="143" r="125"/>
          </svg>
          <div class="ring-center">
            <div class="time-digits" id="time-digits">25:00</div>
            <div class="time-mode"   id="time-mode">FOCUS TIME</div>
            <div class="time-status" id="time-status">&nbsp;</div>
          </div>
        </div>

        <!-- active focused task chip (hidden until task is focused) -->
        <div class="focused-chip" id="focused-chip">
          <span class="focused-chip-label">now:</span>
          <span class="focused-chip-text" id="focused-chip-text">…</span>
          <button class="focused-chip-clear" id="focused-chip-clear" title="clear focus">×</button>
        </div>

        <!-- rotating encouragement quote -->
        <div class="quote-box" id="quote-box">
          <p class="quote-text" id="quote-text">ready when you are bestie 👀</p>
        </div>

        <!-- play / reset / skip -->
        <div class="timer-controls">
          <button class="ctrl-btn" id="reset-btn" title="reset">
            <svg viewBox="0 0 24 24">
              <polyline points="1 4 1 10 7 10"/>
              <path d="M3.51 15a9 9 0 1 0 .49-3.73"/>
            </svg>
          </button>
          <button class="play-btn" id="play-btn">▶</button>
          <button class="ctrl-btn" id="skip-btn" title="skip">
            <svg viewBox="0 0 24 24">
              <polygon points="5 4 15 12 5 20 5 4"/>
              <line x1="19" y1="5" x2="19" y2="19"/>
            </svg>
          </button>
        </div>

        <!-- pomodoro cycle dots -->
        <div class="session-dots" id="session-dots"></div>

      </div>

      <!-- RIGHT: task list -->
      <div class="task-panel">
        <div class="task-panel-header">
          <span class="task-panel-title">the grind list 📋</span>
          <span class="task-badge" id="task-badge">0 tasks</span>
        </div>
        <div class="task-input-row">
          <input class="task-input" id="task-input" type="text"
                 placeholder="add a task bestie…" maxlength="120">
          <button class="task-add-btn" id="task-add-btn">+</button>
        </div>
        <!-- task items injected here by JS -->
        <div class="task-list" id="task-list"></div>
      </div>

    </div>
  </div><!-- /app-wrap -->


  <!-- ── SETTINGS MODAL ───────────────────────────────────── -->
  <div class="modal-overlay" id="settings-overlay">
    <div class="modal">
      <h2 class="modal-title">settings.exe</h2>
      <button class="modal-close-btn" id="modal-close">✕</button>

      <section class="setting-group">
        <h3 class="setting-group-title">session durations (minutes)</h3>

        <div class="setting-row">
          <span class="setting-label">🍅 Pomodoro</span>
          <div class="num-control">
            <button class="num-btn" data-key="pomodoro" data-delta="-1">−</button>
            <span class="num-value" id="s-pomodoro">25</span>
            <button class="num-btn" data-key="pomodoro" data-delta="1">+</button>
          </div>
        </div>
        <div class="setting-row">
          <span class="setting-label">💤 Short break</span>
          <div class="num-control">
            <button class="num-btn" data-key="short" data-delta="-1">−</button>
            <span class="num-value" id="s-short">5</span>
            <button class="num-btn" data-key="short" data-delta="1">+</button>
          </div>
        </div>
        <div class="setting-row">
          <span class="setting-label">🛋 Long break</span>
          <div class="num-control">
            <button class="num-btn" data-key="long" data-delta="-1">−</button>
            <span class="num-value" id="s-long">15</span>
            <button class="num-btn" data-key="long" data-delta="1">+</button>
          </div>
        </div>
        <div class="setting-row">
          <span class="setting-label">🔁 Long break every</span>
          <div class="num-control">
            <button class="num-btn" data-key="interval" data-delta="-1">−</button>
            <span class="num-value" id="s-interval">4</span>
            <button class="num-btn" data-key="interval" data-delta="1">+</button>
          </div>
        </div>
      </section>

      <section class="setting-group">
        <h3 class="setting-group-title">behaviour</h3>
        <div class="toggle-row">
          <span class="toggle-label">Auto-start next session</span>
          <div class="toggle-switch" id="tog-autostart"></div>
        </div>
        <div class="toggle-row">
          <span class="toggle-label">Sound effects</span>
          <div class="toggle-switch on" id="tog-sound"></div>
        </div>
      </section>

      <button class="modal-save-btn" id="modal-save">save it bestie ✦</button>
    </div>
  </div>

  <!-- notification toast -->
  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
